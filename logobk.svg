<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main roof structure - angular modern design -->
  <g>
    <!-- Base shadow for depth -->
    <path d="M10 38 L32 18 L54 38 L49 38 L32 23 L15 38 Z" fill="#0f172a" opacity="0.3"/>
    
    <!-- Main roof top -->
    <path d="M8 36 L32 14 L56 36 L52 36 L32 18 L12 36 Z" fill="#f97316"/>
    
    <!-- Left roof panel with gradient effect -->
    <path d="M12 36 L32 18 L32 26 L16 42 L12 42 Z" fill="#f59e0b"/>
    
    <!-- Right roof panel darker shade -->
    <path d="M32 18 L52 36 L52 42 L48 42 L32 26 Z" fill="#ea580c"/>
    
    <!-- Structure lines - industrial detail -->
    <line x1="32" y1="18" x2="32" y2="50" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="20" y2="50" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="30" x2="44" y2="50" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Base foundation -->
    <rect x="14" y="48" width="36" height="4" fill="#1e293b" rx="1"/>
    
    <!-- Center accent - peak detail -->
    <circle cx="32" cy="16" r="3" fill="#fbbf24" stroke="#0f172a" stroke-width="1.5"/>
    
    <!-- Side supports with rounded ends -->
    <rect x="18" y="42" width="4" height="6" fill="#64748b" rx="2"/>
    <rect x="42" y="42" width="4" height="6" fill="#64748b" rx="2"/>
  </g>
  
  <!-- Protective shield overlay subtle -->
  <path d="M32 14 L38 20 L38 28 L32 32 L26 28 L26 20 Z" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
</svg>